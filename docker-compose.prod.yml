services:
  backend:
    build:
      context: ./backend
      target: production
    image: stress-management-backend:${IMAGE_TAG:-latest}
    container_name: stress-backend
    restart: unless-stopped
    environment:
      PORT: 5000
      NODE_ENV: production
      MONGO_HOST: mongodb
      MONGO_PORT: 27017
      MONGO_DB_NAME: ${MONGO_DB_NAME:-stress-management-portal}
      MONGO_USERNAME: ${MONGO_USERNAME:?MONGO_USERNAME is required}
      MONGO_PASSWORD: ${MONGO_PASSWORD:?MONGO_PASSWORD is required}
      MONGO_AUTH_SOURCE: admin
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - stress-network

  frontend:
    build:
      context: ./frontend
      target: production
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    image: stress-management-frontend:${IMAGE_TAG:-latest}
    container_name: stress-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - stress-network

  mongodb:
    image: mongo:7
    container_name: stress-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME:?MONGO_USERNAME is required}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:?MONGO_PASSWORD is required}
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: >
        mongosh
        --username "$$MONGO_INITDB_ROOT_USERNAME"
        --password "$$MONGO_INITDB_ROOT_PASSWORD"
        --authenticationDatabase admin
        --quiet
        --eval "db.adminCommand('ping').ok"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - stress-network

volumes:
  mongodb_data:

networks:
  stress-network:
    driver: bridge
