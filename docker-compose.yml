services:
  backend:
    build:
      context: ./backend
      target: development
    container_name: stress-backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    environment:
      MONGO_HOST: mongodb
      MONGO_PORT: 27017
      MONGO_DB_NAME: ${MONGO_DB_NAME:-stress-management-portal}
      MONGO_USERNAME: ${MONGO_USERNAME:-stress_user}
      MONGO_PASSWORD: ${MONGO_PASSWORD:-stress_password}
      MONGO_AUTH_SOURCE: admin
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      target: development
    container_name: stress-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_BACKEND_URL: http://backend:5000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

  mongodb:
    image: mongo:7
    container_name: stress-mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME:-stress_user}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-stress_password}
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: >
        mongosh
        --username "$$MONGO_INITDB_ROOT_USERNAME"
        --password "$$MONGO_INITDB_ROOT_PASSWORD"
        --authenticationDatabase admin
        --quiet
        --eval "db.adminCommand('ping').ok"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  mongodb_data:
