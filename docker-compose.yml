version: '3.9'

services:

  backend:
    build: ./backend
    container_name: stress-backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    environment:
      MONGO_HOST: mongodb
      MONGO_PORT: 27017
      MONGO_DB_NAME: stress-management-portal
      MONGO_USERNAME: RashDB
      MONGO_PASSWORD: "@Priyanshu1918"
      MONGO_AUTH_SOURCE: admin
    depends_on:
      - mongodb
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build: ./frontend
    container_name: stress-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_BACKEND_URL: http://backend:5000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

  mongodb:
    image: mongo:7
    container_name: stress-mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: RashDB
      MONGO_INITDB_ROOT_PASSWORD: "@Priyanshu1918"
    volumes:
      - mongodb_data:/data/db

volumes:
  mongodb_data:
